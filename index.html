<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Demographics" content="Page meant to take individual demographics from user">
    <title>Demographics Page</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="class-body">
    <main id="main-content">
    <header>
        <h1 id="header">Demographics Page</h1>
        <nav id="nav-bar">
            <ul>
            <li>Home</li>
             <li>About</li>
            <li>Contact</li>
        </ul>
        </nav>
    </header>
    <p>This page is intended to collect demographic information from users. Make sure you fill it out completely.</p>
    <section id="form">
        <form id="demo-form">
           
            <div class="name-group">
            <label for="fname">First Name</label>
            <input type="text" id="firstname" name="fname">
            <label for="lname">Last Name</label>
            <input type="text" id="lastname" name="lname">
            </div>
            <div class="email-gen-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email address">
            <label for="gender">Gender</label>
            <input type="radio" id="male" name="gender" value="M">
            <input type="radio" id="female" name="gender" value="F">
            </div>
            <label for="dob">Date of birth</label>
            <input type="date" id="dob" name="dob">
            <div class="textarea-group">
            <textarea id="textarea" placeholder="Enter additional information here" rows="10"cols="50"></textarea> 
      
</div>
<button type="submit" name="submitbutton">  submit</button>
            
        </form>

    </section>
    </main>

    <footer id="footer">
        <p>&copy; All rights reserved 2025. </p>
    </footer>


    
</body>
</html>
